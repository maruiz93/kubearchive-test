name: Triage Issue

on:
  issue_comment:
    types: [created]

jobs:
  triage:
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/triage') &&
      github.event.comment.user.login == 'maruiz93'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Setup agent definitions and hooks
        run: |
          mkdir -p .claude/agents .claude/skills
          cp .triage/agents/*.md .claude/agents/
          for skill_dir in .triage/skills/*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" ".claude/skills/$skill_name"
          done
          cp .triage/hooks.json .claude/settings.json

      - name: Run triage agent
        env:
          CLAUDE_CODE_USE_VERTEX: "1"
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: |
          python3 .triage/launcher.py \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}"