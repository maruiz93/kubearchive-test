name: Triage Issue

on:
  issue_comment:
    types: [created]

jobs:
  triage:
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/triage') &&
      github.event.comment.user.login == 'maruiz93'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash -s -- 2.1.96
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Install OpenShell
        run: |
          curl -fsSL -o /tmp/openshell.tar.gz \
            https://github.com/NVIDIA/OpenShell/releases/latest/download/openshell-x86_64-unknown-linux-musl.tar.gz
          tar -xzf /tmp/openshell.tar.gz -C /usr/local/bin/
          openshell --version

      - name: Start OpenShell gateway
        run: |
          openshell gateway start
          openshell status

      - name: Setup agent definitions
        run: |
          mkdir -p .claude/agents .claude/skills
          cp .triage/agents/*.md .claude/agents/
          for skill_dir in .triage/skills/*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" ".claude/skills/$skill_name"
          done

      - name: Run triage agent
        env:
          CLAUDE_CODE_USE_VERTEX: "1"
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
        run: |
          cd .triage && python3 -m launcher \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}"

      - name: Convert transcripts to plain text
        if: always()
        run: python3 .github/scripts/transcripts-to-text.py /tmp/triage-logs

      - name: Upload triage logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-logs
          path: /tmp/triage-logs/
          retention-days: 7
          if-no-files-found: ignore