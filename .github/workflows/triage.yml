name: Triage Issue

on:
  issue_comment:
    types: [created]

jobs:
  triage:
    if: >
      github.event.issue.pull_request == null &&
      contains(github.event.comment.body, '/triage') &&
      github.event.comment.user.login == 'maruiz93'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"

      - name: Install OpenShell
        run: |
          curl -fsSL -o /tmp/openshell.tar.gz \
            https://github.com/NVIDIA/OpenShell/releases/latest/download/openshell-x86_64-unknown-linux-musl.tar.gz
          tar -xzf /tmp/openshell.tar.gz -C /usr/local/bin/
          openshell --version

      - name: Setup agent definitions and hooks
        run: |
          mkdir -p .claude/agents .claude/skills
          cp .triage/agents/*.md .claude/agents/
          for skill_dir in .triage/skills/*/; do
            skill_name=$(basename "$skill_dir")
            cp -r "$skill_dir" ".claude/skills/$skill_name"
          done
          # Write hooks config with absolute path to the sandbox script
          cat > .claude/settings.json << EOF
          {
            "hooks": {
              "SubagentStart": [
                {
                  "matcher": "",
                  "hooks": [{
                    "type": "command",
                    "command": "$(pwd)/.triage/scripts/apply-sandbox.sh"
                  }]
                }
              ]
            }
          }
          EOF
          cat .claude/settings.json

      - name: Run triage agent
        env:
          CLAUDE_CODE_USE_VERTEX: "1"
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ secrets.GCP_PROJECT }}
          CLOUD_ML_REGION: ${{ secrets.GCP_REGION }}
          SANDBOX_LOG: /tmp/sandbox.log
        run: |
          python3 .triage/launcher.py \
            --token "${{ secrets.GITHUB_TOKEN }}" \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}"

      - name: Sandbox log
        if: always()
        run: |
          if [[ -f /tmp/sandbox.log ]]; then
            echo "--- Sandbox hook activity ---"
            cat /tmp/sandbox.log
          else
            echo "No sandbox hook activity recorded"
          fi

      - name: Upload session transcripts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-session
          path: ~/.claude/projects/
          retention-days: 7
          if-no-files-found: ignore