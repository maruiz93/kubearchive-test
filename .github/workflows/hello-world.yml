name: Hello World Agent

on:
  workflow_dispatch:

jobs:
  hello-world:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install fullsend
        run: |
          curl -LsSf https://github.com/maruiz93/fullsend/releases/download/runner-hello-world-dev/fullsend_dev_linux_amd64.tar.gz -o /tmp/fullsend.tar.gz
          sudo tar xzf /tmp/fullsend.tar.gz -C /usr/local/bin/
          fullsend --version

      - name: Install OpenShell
        run: |
          curl -LsSf https://raw.githubusercontent.com/NVIDIA/OpenShell/main/install.sh | sh
          openshell --version

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run hello-world agent
        env:
          REPO_NAME: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          fullsend entrypoint hello-world --harness-dir experiments/runner-hello-world

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-world-output
          path: experiments/runner-hello-world/output/
