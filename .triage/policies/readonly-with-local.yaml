version: 1

# Policy for the reproducibility-verifier.
# Read-only GitHub API + local filesystem read access.
# No external web access.
#
# Placeholders {{OWNER}}, {{REPO_NAME}}, and {{ISSUE_NUMBER}} are substituted
# at runtime by run-sandboxed.sh using REPO and ISSUE_NUMBER env vars.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log, /sandbox]
  read_write: [/tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github_api:
    name: github-api-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/{{ISSUE_NUMBER}}
    binaries:
      - path: "**"
  mcp_server:
    name: mcp-server
    endpoints:
      - host: host.docker.internal
        port: 8081
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**"