version: 1

# Policy for the reproducibility-verifier.
# Can read the original issue + read/run against the local repo checkout.
# NO external web access beyond the GitHub API for the original issue.

filesystem_policy:
  read_only: [/usr, /lib, /etc, "${REPO_PATH}"]
  read_write: [/tmp]

process:
  run_as_user: sandbox

network_policies:
  github_issue:
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/repos/${REPO}/issues/${ISSUE_NUMBER}"
          - allow:
              method: GET
              path: "/repos/${REPO}/issues/${ISSUE_NUMBER}/comments"
    binaries:
      - { path: "**" }
  deny_all:
    endpoints:
      - host: "**"
        enforcement: enforce
        access: deny