version: 1

# Policy for the duplicate-detector.
# Read-only access to GitHub API (search for duplicates).
# No write access, no external web, no local filesystem beyond sandbox.
#
# Placeholders {{OWNER}} and {{REPO_NAME}} are substituted at runtime
# by run-sandboxed.sh using REPO env var (set by launcher.py).

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github_api:
    name: github-api-readonly
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/*
          - allow:
              method: GET
              path: /search/issues
    binaries:
      - path: "**"