version: 1

# Policy for the duplicate-detector.
# Read-only access to the GitHub REST server on the host (search for duplicates).
# No write access, no external web, no local filesystem beyond sandbox.
#
# Placeholders {{OWNER}} and {{REPO_NAME}} are substituted at runtime
# by the agent runner.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  gh_server:
    name: gh-server-readonly
    endpoints:
      # GitHub REST server on the host. GET-only via L7 enforcement.
      # allowed_ips bypasses default SSRF guard for private IPs.
      - host: host.docker.internal
        port: 8081
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/*
          - allow:
              method: GET
              path: /search/issues
        allowed_ips:
          - "{{HOST_IP}}/32"
    binaries:
      - path: "**/curl"
      - path: "**/claude"
  vertex_ai:
    name: vertex-ai
    endpoints:
      - host: "*.googleapis.com"
        port: 443
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**/curl"
      - path: "**/claude"
