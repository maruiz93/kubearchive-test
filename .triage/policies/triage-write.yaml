version: 1

# Policy for the triage agent (orchestrator).
# Read-write access to GitHub API (post comments, add labels).
# Access to OpenShell gateway for creating sub-sandboxes.
# No external web, no local filesystem beyond sandbox.
#
# Placeholders {{OWNER}}, {{REPO_NAME}}, and {{ISSUE_NUMBER}} are substituted
# at runtime by run-sandboxed.sh using REPO and ISSUE_NUMBER env vars.

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  github_api:
    name: github-api-readwrite
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/{{ISSUE_NUMBER}}
          - allow:
              method: POST
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/{{ISSUE_NUMBER}}/comments
          - allow:
              method: POST
              path: /repos/{{OWNER}}/{{REPO_NAME}}/issues/{{ISSUE_NUMBER}}/labels
          - allow:
              method: GET
              path: /repos/{{OWNER}}/{{REPO_NAME}}/labels
    binaries:
      - path: "**"
  mcp_server:
    name: mcp-server
    endpoints:
      - host: host.docker.internal
        port: 8081
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**"
  openshell_gateway:
    name: openshell-gateway
    endpoints:
      # Gateway API for sandbox lifecycle (create, policy set, ssh-config, delete)
      - host: host.docker.internal
        port: 8080
        protocol: tcp
        enforcement: enforce
        access: allow
      # SSH to sub-sandboxes (dynamic ports assigned by gateway)
      - host: host.docker.internal
        port: 2222-65535
        protocol: tcp
        enforcement: enforce
        access: allow
    binaries:
      - path: "**"