version: 1

# Policy for the completeness-assessor.
# Can read the original issue + follow any external link (HTTPS GET only).
# No write access anywhere.

filesystem_policy:
  read_only: [/usr, /lib, /etc, /sandbox]
  read_write: [/tmp]

process:
  run_as_user: sandbox

network_policies:
  github_issue:
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/repos/${REPO}/issues/${ISSUE_NUMBER}"
          - allow:
              method: GET
              path: "/repos/${REPO}/issues/${ISSUE_NUMBER}/comments"
    binaries:
      - { path: "**" }
  web_fetch:
    endpoints:
      - host: "**"
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
    binaries:
      - { path: "**" }
  deny_all:
    endpoints:
      - host: "**"
        enforcement: enforce
        access: deny